{% extends "base.html" %}{% block content %}
<div class="topbar"><h1>App Update Settings</h1></div>
<div class="card">
<form method="post">
  <div class="form-row">
    <div>
      <label>
        <input type="checkbox" name="force_update_enabled" {% if settings.force_update_enabled %}checked{% endif %}>
        Force Update ON (toggle)
      </label>
    </div>
  </div>
  <div class="form-row">
    <div><label>Minimum Version Code Required</label>
      <input name="min_version_code" type="number" value="{{ settings.min_version_code }}"></div>
    <div><label>Play Store URL</label>
      <input name="play_store_url" value="{{ settings.play_store_url }}"></div>
  </div>
  <div class="form-row">
    <div><label>Update Message shown to user</label>
      <input name="update_message" value="{{ settings.update_message }}"></div>
  </div>
  <button class="btn btn-primary">Save</button>
</form>
</div>
{% endblock %}
